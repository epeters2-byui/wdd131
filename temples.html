<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Temple Album">
    <meta name="author" content="Your Name">
    <title>Temple Album</title>
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/temples.js" defer></script>
</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <nav>
            <button class="hamburger">&#9776;</button>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- "Home" as centered text above the images -->
        <div class="home-text">
            <span>Home</span>
        </div>
        <div class="temple-gallery">
            <!-- Temple Image 1 -->
            <figure>
                <img src="images/acra_ghana_2.jpg" alt="Temple 1">
                <figcaption>Acra Temple</figcaption>
            </figure>
            <!-- Temple Image 2 -->
            <figure>
                <img src="images/Salt_lake_8.jpg" alt="Temple 2">
                <figcaption>Salt LAke Temple</figcaption>
            </figure>
            <!-- Temple Image 3 -->
            <figure>
                <img src="images/sapporo_japan.jpeg" alt="Temple 3">
                <figcaption>Sapporo Temple</figcaption>
            </figure>
            <!-- Temple Image 4 -->
            <figure>
                <img src="images/hongkong_china_8.jpg" alt="Temple 4">
                <figcaption>Honk Kong, China</figcaption>
            </figure>
            <!-- Temple Image 5 -->
            <figure>
                <img src="images/freiberg_germany_5.jpg" alt="Temple 5">
                <figcaption>Freiberg Temple</figcaption>
            </figure>
            <!-- Temple Image 6 -->
            <figure>
                <img src="images/Paris_France_3.jpg" alt="Temple 6">
                <figcaption>Paris Temple</figcaption>
            </figure>
            <!-- Temple Image 7 -->
            <figure>
                <img src="images/hague_holland_7.jpg" alt="Temple 7">
                <figcaption>Hague, Holland</figcaption>
            </figure>
            <!-- Temple Image 8 -->
            <figure>
                <img src="images/rome_Italy_4.jpg" alt="Temple 8">
                <figcaption>Rome Temple</figcaption>
            </figure>
            <!-- Temple Image 9 -->
            <figure>
                <img src="images/san_diego_6.jpg" alt="Temple 9">
                <figcaption>San Diego Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>
            &copy; <span id="currentyear"></span> 
            <img src="images/rose.png" alt="Rose" class="rose-icon">
            Emmanuel M. Peters 
            <img src="images/rose.png" alt="Rose" class="rose-icon">
            Liberia
        </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
